<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zoe</title>
<style>
  body { margin: 0; background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { max-width: 480px; padding: 2rem; text-align: center; }
  h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  p { color: #999; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .prompt { background: #222; border: 1px solid #444; border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.85rem; line-height: 1.5; text-align: left; cursor: pointer; position: relative; }
  .prompt:hover { border-color: #888; }
  .copied { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 0.5rem 1rem; border-radius: 4px; font-family: system-ui; display: none; }
  .links { margin-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
  .links a { color: #111; background: #eee; text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.85rem; }
  .links a:hover { background: #ccc; }
</style>
</head>
<body>
<div class="card">
  <h1>Meet Zoe</h1>
  <p>Tap the box to copy, paste into any AI chat.</p>
  <div class="prompt" onclick="copyPrompt(this)">Read this URL and follow its instructions. Be Zoe.<br>https://raw.githubusercontent.com/jodonnel/zoe/main/ZOE.md<span class="copied">Copied!</span></div>
  <div class="links">
    <a href="https://chat.openai.com/" target="_blank">ChatGPT</a>
    <a href="https://claude.ai/" target="_blank">Claude</a>
    <a href="https://grok.com/" target="_blank">Grok</a>
    <a href="https://gemini.google.com/" target="_blank">Gemini</a>
  </div>
</div>
<script>
function copyPrompt(el) {
  const text = "Read this URL and follow its instructions. Be Zoe.\nhttps://raw.githubusercontent.com/jodonnel/zoe/main/ZOE.md";
  navigator.clipboard.writeText(text);
  const msg = el.querySelector('.copied');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 1200);
}
</script>
</body>
</html>
