<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zoe</title>
<style>
  body { margin: 0; background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { max-width: 480px; padding: 2rem; text-align: center; }
  h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  p { color: #999; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .prompt { background: #222; border: 1px solid #444; border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.85rem; line-height: 1.5; text-align: left; cursor: pointer; position: relative; margin-bottom: 0.75rem; }
  .prompt:hover { border-color: #888; }
  .btn-full { background: #222; border: 1px solid #444; border-radius: 8px; padding: 1rem; font-family: system-ui; font-size: 0.85rem; color: #eee; cursor: pointer; width: 100%; text-align: center; position: relative; margin-bottom: 1.5rem; }
  .btn-full:hover { border-color: #888; }
  .copied { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 0.5rem 1rem; border-radius: 4px; font-family: system-ui; display: none; z-index: 1; }
  .links { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
  .links a { color: #111; background: #eee; text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.85rem; }
  .links a:hover { background: #ccc; }
  .label { color: #666; font-size: 0.75rem; margin-bottom: 0.25rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Meet Zoe</h1>
  <p>Tap to copy, paste into any AI chat.</p>
  <div class="label">Quick — copies prompt + URL</div>
  <div class="prompt" onclick="copyPrompt(this)">Read this URL and follow its instructions. Be Zoe.<br>https://raw.githubusercontent.com/jodonnel/zoe/main/ZOE.md<span class="copied">Copied!</span></div>
  <div class="label">Full — copies the entire ZOE.md</div>
  <div class="btn-full" onclick="copyFull(this)">Copy ZOE.md<span class="copied">Copied!</span></div>
  <div class="links">
    <a href="https://chat.openai.com/" target="_blank">ChatGPT</a>
    <a href="https://claude.ai/" target="_blank">Claude</a>
    <a href="https://grok.com/" target="_blank">Grok</a>
    <a href="https://gemini.google.com/" target="_blank">Gemini</a>
  </div>
</div>
<script>
function flash(el) {
  const msg = el.querySelector('.copied');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 1200);
}
function copyPrompt(el) {
  navigator.clipboard.writeText("Read this URL and follow its instructions. Be Zoe.\nhttps://raw.githubusercontent.com/jodonnel/zoe/main/ZOE.md");
  flash(el);
}
async function copyFull(el) {
  try {
    const r = await fetch("https://raw.githubusercontent.com/jodonnel/zoe/main/ZOE.md");
    const md = await r.text();
    await navigator.clipboard.writeText("Be Zoe.\n\n" + md);
    flash(el);
  } catch(e) {
    el.querySelector('.copied').textContent = 'Failed';
    flash(el);
  }
}
</script>
</body>
</html>
